<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAPES CRATE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background video -->
  <video class="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="public/videos/background-main.mp4" type="video/mp4">
  </video>

  <!-- Dark overlay on background -->
  <div class="bg-overlay"></div>

  <!-- Content container -->
  <div class="content-container">
    <video class="cassette" autoplay muted loop playsinline preload="auto">
      <source src="public/videos/sentinel-casette.mp4" type="video/mp4">
    </video>
    <h1 class="title">SENTINEL OF STAINED GREEN</h1>
    <p class="artist">JENEVERBES</p>
  </div>

  <!-- Bottom buttons -->
  <div class="button-container">
    <button class="play-btn" id="play-btn">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 10L38 24L16 38V10Z" fill="#000000"/>
      </svg>
    </button>
    <button class="queue-btn">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 12H32" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
        <path d="M8 20H28" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
        <path d="M8 28H24" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
        <path d="M32 22L40 28L32 34V22Z" fill="#ffffff"/>
        <circle cx="37" cy="20" r="2" fill="#ffffff"/>
      </svg>
    </button>
  </div>

  <!-- Popup overlay -->
  <div class="popup-overlay" id="popup-overlay">
    <div class="modal">
      <p class="modal-header">LISTEN ON:</p>
      <button class="close-btn" id="close-btn">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="16" fill="#3d3d3d"/>
          <path d="M11 11L21 21M21 11L11 21" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="services">
        <a href="#" class="service-row">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <circle cx="16" cy="16" r="16" fill="#1DB954"/>
            <path d="M23.2 21.8c-.3 0-.5-.1-.7-.2-3.3-2-7.2-2.4-10.6-1.4-.4.1-.8-.1-.9-.5-.1-.4.1-.8.5-.9 3.8-1.1 8.1-.7 11.8 1.6.3.2.4.7.2 1-.1.3-.3.4-.3.4zm1.2-3.2c-.3 0-.6-.1-.8-.3-3.8-2.3-9.5-3-13.9-1.6-.4.1-.9-.1-1-.5-.1-.4.1-.9.5-1 4.9-1.5 11.1-.8 15.3 1.8.4.2.5.8.3 1.2-.2.3-.3.4-.4.4zm.1-3.7c-4.5-2.7-11.9-2.9-16.2-1.6-.5.1-1-.1-1.2-.6-.1-.5.1-1 .6-1.2 4.9-1.5 13.1-1.2 18.2 1.9.5.3.6.9.3 1.3-.2.3-.5.4-.7.2z" fill="white"/>
          </svg>
          <span>SPOTIFY</span>
        </a>
        <a href="#" class="service-row">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#FC3C44"/>
            <path d="M22.5 10.2c0-.4-.3-.6-.6-.6h-.1c-3.8.5-7.4 2-10.3 4.5-.2.2-.3.4-.3.7v7.6c-.4-.2-.9-.3-1.4-.3-1.5 0-2.8 1.1-2.8 2.5s1.3 2.5 2.8 2.5 2.8-1.1 2.8-2.5V15.8c2.4-1.9 5.2-3.1 8.2-3.6V16c-.4-.2-.9-.3-1.4-.3-1.5 0-2.8 1.1-2.8 2.5s1.3 2.5 2.8 2.5 2.8-1.1 2.8-2.5v-8h.3z" fill="white"/>
          </svg>
          <span>APPLE MUSIC</span>
        </a>
        <a href="#" class="service-row">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="7" fill="#FFCC00"/>
            <text x="16" y="23" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#000000">Я</text>
          </svg>
          <span>YANDEX.MUSIC</span>
        </a>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
