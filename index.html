<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAPES CRATE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background video -->
  <video class="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="public/videos/background-main.mp4" type="video/mp4">
  </video>

  <!-- Dark overlay on background -->
  <div class="bg-overlay"></div>

  <!-- Content container -->
  <div class="content-container">
    <video class="cassette" autoplay muted loop playsinline preload="auto">
      <source src="public/videos/sentinel-casette.mp4" type="video/mp4">
    </video>
    <h1 class="title">SENTINEL OF STAINED GREEN</h1>
    <p class="artist">JENEVERBES</p>
  </div>

  <!-- Bottom buttons -->
  <div class="button-container">
    <button class="play-btn" id="play-btn">
      <img src="public/icons/play.svg" alt="Play" width="48" height="48">
    </button>
    <button class="queue-btn">
      <img src="public/icons/playlist.svg" alt="Queue" width="48" height="48">
    </button>
  </div>

  <!-- Popup overlay -->
  <div class="popup-overlay" id="popup-overlay">
    <div class="modal">
      <p class="modal-header">LISTEN ON:</p>
      <button class="close-btn" id="close-btn">
        <img src="public/icons/close.svg" alt="Close" width="32" height="32">
      </button>
      <div class="services">
        <a href="#" class="service-row">
          <img src="public/icons/spotify.svg" alt="Spotify" width="32" height="32">
          <span>SPOTIFY</span>
        </a>
        <a href="#" class="service-row">
          <img src="public/icons/apple-music.svg" alt="Apple Music" width="32" height="32">
          <span>APPLE MUSIC</span>
        </a>
        <a href="#" class="service-row">
          <img src="public/icons/yandex.svg" alt="Yandex Music" width="32" height="32">
          <span>YANDEX.MUSIC</span>
        </a>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
